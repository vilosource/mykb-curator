# Curator-ready MediaWiki for local/hand-driven use.
#
# Scenario tests build + run the SAME Dockerfile via testcontainers;
# this compose is the human-facing equivalent — first boot installs
# the wiki (SQLite), enables uploads, and promotes Admin to bot.
#
# Usage:
#   docker compose -f deployments/mediawiki/docker-compose.yml up -d --build
#   open http://localhost:8181        # login: Admin / adminpassword-9999
#   docker compose -f deployments/mediawiki/docker-compose.yml down -v
#
# Data persists in the mediawiki-data volume across restarts (install
# is idempotent — keyed on LocalSettings.php presence).

services:
  mediawiki:
    build:
      context: .
      dockerfile: Dockerfile
    image: mykb-curator/test-mediawiki:dev
    container_name: mykb-curator-test-mediawiki
    ports:
      - "8181:80"
    environment:
      # Pin $wgServer for the fixed host port (bootstrap also falls
      # back to per-request Host detection when this is unset).
      MW_SERVER: "http://localhost:8181"
    volumes:
      - mediawiki-data:/var/www/data

volumes:
  mediawiki-data:
