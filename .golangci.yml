# golangci-lint configuration for mykb-curator.
#
# v2 format. Conservative set focused on bugs and dead code rather
# than style/comment policing — revive's exported-comment-required
# rules add noise without catching real problems. We rely on code
# review for style.

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

  settings:
    errcheck:
      # Functions where the unchecked-error pattern is idiomatic.
      # Listed explicitly so a future surprising case still warns.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (hash.Hash).Write

formatters:
  enable:
    - gofmt
    - goimports
