# golangci-lint configuration for mykb-curator.
#
# v2 format. Conservative starter linter set — we add linters as the
# codebase grows. The goal is "block obvious mistakes, don't argue
# about style."

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive

  exclusions:
    rules:
      # Test files: allow long functions and global state for fakes.
      - path: _test\.go
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports
