# golangci-lint configuration for mykb-curator.
#
# v1 format (pinned to golangci-lint v1.x in CI). Conservative
# starter set — we add linters as the codebase grows. The goal is
# "block obvious mistakes, don't argue about style."

run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gofmt
    - goimports
    - revive

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: false

issues:
  exclude-rules:
    # Test files: allow long functions and global state for fakes.
    - path: _test\.go
      linters:
        - revive
